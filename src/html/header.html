<header class="header">
    <div class="container">
        <div class="header__logo logo">
            <span class="logo__bacgraund">
                <svg class="logo__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                    <polyline points="16 7 22 7 22 13"></polyline>
                </svg>
            </span>
            <div class="logo__text">
                <span class="logo__title">Interestify</span>
                <span class="logo__subtitle">Калькулятор складних відсотків</span>
            </div>
        </div>

        <div class="header__actions actions">

            <div class="dropdown dropdown__currency" id="currencyDropdown">
                <button class="actions__button dropdown__toggle" type="button">
                    <svg class="actions__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="8" cy="8" r="6"></circle>
                        <path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path>
                        <path d="M7 6h1v4"></path>
                        <path d="m16.71 13.88.7.71-2.82 2.82"></path>
                    </svg>
                    <span class="actions__text">$</span>
                    <svg class="actions__arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>

                <ul class="dropdown__menu is-hidden">
                    <li class="dropdown__item dropdown__item--selected">
                        <span class="dropdown__item-type">$</span>
                        <span class="dropdown__item-label">US Dollar</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">€</span>
                        <span class="dropdown__item-label">Euro</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">₴</span>
                        <span class="dropdown__item-label">Ukrainian Hryvnia</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">£</span>
                        <span class="dropdown__item-label">British Pound</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">⬡</span>
                        <span class="dropdown__item-label">Generic Unit</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                </ul>
            </div>

            <div class="dropdown dropdown__language" id="languageDropdown">
                <button class="actions__button" type="button">
                    <svg class="actions__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                        <path d="M2 12h20"></path>
                    </svg>
                    <span class="actions__text">UA</span>
                    <svg class="actions__arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>

                <ul class="dropdown__menu is-hidden">
                    <li class="dropdown__item dropdown__item--selected">
                        <span class="dropdown__item-type">UA</span>
                        <span class="dropdown__item-label">Українська</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">EN</span>
                        <span class="dropdown__item-label">English</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">ES</span>
                        <span class="dropdown__item-label">Español</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                    <li class="dropdown__item">
                        <span class="dropdown__item-type">FR</span>
                        <span class="dropdown__item-label">Français</span>
                        <svg class="dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5"></path>
                        </svg>
                    </li>
                </ul>
            </div>

            <button class="actions__button actions__button--theme" type="button" aria-label="Змінити тему">
                <svg class="actions__icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>

        </div>
    </div>
</header>
